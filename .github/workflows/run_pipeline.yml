name: Run ETL Pipeline Daily

on:
  schedule:
    # Se ejecutará automáticamente todos los días a las 10:05 UTC (Para hacer el cierre de inventario diario)
    - cron: '5 2 * * *' 
  workflow_dispatch: 
    # Esto te activa un botón en GitHub para que lo puedas correr manualmente cuando quieras

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar repositorio de GitHub
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar librerías del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread google-auth duckdb

    - name: Crear archivo de credenciales
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: echo "$GOOGLE_CREDENTIALS" > credenciales.json

    - name: Ejecutar script de Python
      run: python pipeline.py
